---
# Lint every committed Markdown document by default so docs, repository
# guidance, and README files follow one repository-wide style.
globs:
  - "**/*.md"

# Exclude Agent-local work areas. The repository tracks reusable skills but not
# transient worktrees, so include neither in this Markdown lint rollout.
ignores:
  - ".agents/**"

# Respect .gitignore so generated, local, or tool cache Markdown files do not
# affect CI when they are intentionally outside version control.
gitignore: true

config:
  # Start from markdownlint's recommended defaults, then document each local
  # exception below instead of maintaining a broad custom rule set.
  default: true

  # Existing prose clusters around 118-120 columns. Re-evaluate this
  # hard-coded width only after remeasuring current docs, and keep code blocks
  # and tables exempt unless examples or tables become intentionally wrapped.
  MD013:
    line_length: 120
    code_blocks: false
    tables: false

  # Use four-space nested list indentation for conservative renderer
  # compatibility. Keep this hard-coded unless the project intentionally drops
  # support for renderers that handle two-space nesting inconsistently.
  MD007:
    indent: 4

  # Repeated headings are expected under separate class or topic sections, so
  # only duplicate sibling headings are suspicious.
  MD024:
    siblings_only: true

  # Agent guidance may need to appear before the first visible heading, so do
  # not require the first line to be an H1.
  MD041: false
