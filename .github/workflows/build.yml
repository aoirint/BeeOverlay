name: Build

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  build:
    # Build keeps ubuntu-latest because packaging currently relies on
    # runner-provided shell tools such as jq and 7z.
    runs-on: ubuntu-latest
    outputs:
      release_mode: ${{ steps.generate-version.outputs.release_mode }}
      app_version: ${{ steps.generate-version.outputs.app_version }}
      git_version: ${{ steps.generate-version.outputs.git_version }}
      manifest_version: ${{ steps.generate-version.outputs.manifest_version }}
    steps:
      # Checkout is required before generating versions because the local
      # composite action reads project files and fetches tags from this clone.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Generate version
        id: generate-version
        uses: ./.github/actions/generate-version
        with:
          csproj_file: "BeeOverlay/BeeOverlay.csproj"
      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: '10.x'
          cache: true
          cache-dependency-path: BeeOverlay/packages.lock.json
      - name: Restore NuGet packages
        run: dotnet restore --locked-mode
      - name: Run dotnet build
        run: |
          dotnet_build_args=(--no-restore --configuration Release)
          if [ "${{ steps.generate-version.outputs.release_mode }}" != "latest" ]; then
            # BepInEx 5 validates plugin metadata as System.Version, which
            # rejects SemVer prerelease and edge strings. Keep release identity
            # in Version, and scope the loader-facing fallback to this build.
            dotnet_build_args+=(/p:BepInExPluginVersion=0.0.0)
          fi

          dotnet build "${dotnet_build_args[@]}"
      - name: Create artifact
        run: |
          TMP_ARTIFACT_DIR=./tmp_artifacts
          ARTIFACT_STEM=BeeOverlay-v${{ steps.generate-version.outputs.app_version }}
          mkdir -p "${TMP_ARTIFACT_DIR}/${ARTIFACT_STEM}"
          # Keep this layout as the Thunderstore package root; consumers expect
          # the DLL, manifest, icon, docs, changelog, and license at zip root.
          # https://thunderstore.io/c/lethal-company/create/docs/
          mv ./BeeOverlay/bin/Release/netstandard2.1/com.aoirint.BeeOverlay.dll "${TMP_ARTIFACT_DIR}/${ARTIFACT_STEM}/"
          cp ./assets/manifest.json "${TMP_ARTIFACT_DIR}/${ARTIFACT_STEM}/manifest.json"
          cp ./assets/icon.png "${TMP_ARTIFACT_DIR}/${ARTIFACT_STEM}/"
          cp ./assets/README.md "${TMP_ARTIFACT_DIR}/${ARTIFACT_STEM}/README.md"
          cp ./assets/CHANGELOG.md "${TMP_ARTIFACT_DIR}/${ARTIFACT_STEM}/CHANGELOG.md"
          cp ./LICENSE "${TMP_ARTIFACT_DIR}/${ARTIFACT_STEM}/"
          cd "${TMP_ARTIFACT_DIR}/${ARTIFACT_STEM}"
          7z a -r "../${ARTIFACT_STEM}.zip" .
          cd ..
          rm -rf "${ARTIFACT_STEM:?}/"
      - name: Upload artifact
        id: upload-artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: artifact
          path: ./tmp_artifacts/*.zip
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

  release:
    needs:
      - build
    # Edge builds are validation artifacts only; GitHub releases are created
    # only for new project versions that should receive a tag.
    if: needs.build.outputs.release_mode != 'edge'
    runs-on: ubuntu-slim
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: artifact
          path: ./tmp_artifacts
      - name: Publish release
        # Create immutable releases so an already-published version cannot be
        # silently replaced by a later workflow run for the same tag.
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        with:
          tag: ${{ needs.build.outputs.git_version }}
          commit: ${{ github.sha }}
          immutableCreate: true
          prerelease: ${{ needs.build.outputs.release_mode != 'latest' }}
          makeLatest: ${{ needs.build.outputs.release_mode == 'latest' }}
          generateReleaseNotes: true
          artifacts: |
            ./tmp_artifacts/*.zip
          artifactErrorsFailBuild: true
          artifactContentType: application/zip
      - name: Publish stable release to Thunderstore
        id: publish-thunderstore
        if: needs.build.outputs.release_mode == 'latest'
        uses: ./.github/actions/publish-thunderstore
        with:
          artifact_path: ./tmp_artifacts/*.zip
          token: ${{ secrets.THUNDERSTORE_TOKEN }}
          namespace: aoirint
          community: lethal-company
          community_categories: |
            mods
            tweaks-and-quality-of-life
            ai-generated
